name: pasta_shop
description: "A new Flutter project about Pasta Shop."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_ui_auth: ^3.0.1
  firebase_ui_oauth_google: ^2.0.1
  flutter:
    sdk: flutter
  google_sign_in: ^6.3.0
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - images/spaghetti_aglio_olio.png
    - images/spicy_pasta.png
    - images/creamy_garlic_pasta.png
    - images/tomato_spaghetti.png
